<nav class="navbar">
  <div class="nav-inner">
    <!-- Logo -->
    <a routerLink="/" class="logo"> <span class="logo-bm">BM</span>Market </a>

    <!-- Hamburger toggle (mobile) -->
    <button
      class="hamburger"
      (click)="menuOpen = !menuOpen"
      [class.open]="menuOpen"
      aria-label="Toggle menu"
    >
      <span></span><span></span><span></span>
    </button>

    <!-- Nav Links -->
    <div class="nav-links" [class.nav-open]="menuOpen">
      <a
        routerLink="/products"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: false }"
        class="nav-link"
        (click)="menuOpen = false"
      >
        <span class="nav-icon">🛍️</span> Marketplace
      </a>

      <ng-container *ngIf="currentUser; else guestLinks">
        <a
          routerLink="/my-products"
          routerLinkActive="active"
          class="nav-link"
          (click)="menuOpen = false"
        >
          <span class="nav-icon">📦</span> My Products
        </a>
        <a
          routerLink="/orders"
          routerLinkActive="active"
          class="nav-link"
          (click)="menuOpen = false"
        >
          <span class="nav-icon">📋</span> Orders
        </a>
        <a
          routerLink="/chat"
          routerLinkActive="active"
          class="nav-link"
          (click)="menuOpen = false"
        >
          <span class="nav-icon">💬</span> Messages
          <span
            class="pill-badge"
            *ngIf="notificationCount > 0"
            (click)="clearNotifications()"
            >{{ notificationCount }}</span
          >
        </a>
        <a
          routerLink="/checkout"
          routerLinkActive="active"
          class="nav-link nav-link--cart"
          (click)="menuOpen = false"
        >
          <span class="nav-icon">🛒</span> Cart
          <span class="pill-badge" *ngIf="cartCount > 0">{{ cartCount }}</span>
        </a>

        <div class="nav-divider"></div>

        <div class="user-menu">
          <a
            routerLink="/profile"
            class="nav-profile"
            (click)="menuOpen = false"
          >
            <span class="avatar-ring">{{
              currentUser.username.charAt(0).toUpperCase()
            }}</span>
            <span class="username-label">{{ currentUser.username }}</span>
          </a>
          <button (click)="logout()" class="btn-logout">Logout</button>
        </div>
      </ng-container>

      <ng-template #guestLinks>
        <a
          routerLink="/login"
          routerLinkActive="active"
          class="nav-link"
          (click)="menuOpen = false"
          >Login</a
        >
        <a routerLink="/register" class="btn-signup" (click)="menuOpen = false"
          >Sign Up</a
        >
      </ng-template>
    </div>
  </div>

  <!-- Notification Toast -->
  <div *ngIf="latestNotification" class="nav-toast">
    🔔 {{ latestNotification }}
  </div>
</nav>

<!-- Mobile overlay -->
<div class="nav-overlay" *ngIf="menuOpen" (click)="menuOpen = false"></div>
